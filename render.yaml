services:
  - type: web
    name: skillbridge-backend
    env: python
    buildCommand: |
      cd backend
      pip install -r requirements.txt
    startCommand: |
      cd backend
      uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: skillbridge-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        value: dlbc6avuc
      - key: CLOUDINARY_API_KEY
        value: 325349969322864
      - key: CLOUDINARY_API_SECRET
        sync: false
    plan: free

databases:
  - name: skillbridge-db
    plan: free